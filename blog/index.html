<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog – Santana Fruits</title>
  <meta name="description" content="Wissenswertes über Tropenfrüchte, Nachhaltigkeit und Rezepte von Santana Fruits.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream: #faf6ef;
      --sand: #f0e8d6;
      --terracotta: #c8603a;
      --terracotta-light: #e07a52;
      --forest: #2d4a2d;
      --forest-light: #3d6b3d;
      --text: #1a1a14;
      --muted: #7a7060;
      --border: #e0d8c8;
      --white: #ffffff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--cream);
      color: var(--text);
      line-height: 1.6;
    }

    /* ── NAV ── */
    nav {
      background: var(--forest);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      color: var(--cream);
      text-decoration: none;
      letter-spacing: 0.02em;
    }
    .nav-logo span { color: var(--terracotta-light); }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a {
      color: rgba(250,246,239,0.75);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 400;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    .nav-links a:hover, .nav-links a.active { color: var(--cream); }
    .nav-links a.active { border-bottom: 2px solid var(--terracotta-light); padding-bottom: 2px; }

    /* ── HERO ── */
    .blog-hero {
      background: var(--forest);
      padding: 5rem 2rem 4rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .blog-hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 70% 50%, rgba(200,96,58,0.15) 0%, transparent 60%);
      pointer-events: none;
    }
    .blog-hero-label {
      display: inline-block;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--terracotta-light);
      margin-bottom: 1rem;
      font-weight: 500;
    }
    .blog-hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      color: var(--cream);
      line-height: 1.1;
      margin-bottom: 1rem;
    }
    .blog-hero h1 em { font-style: italic; color: var(--terracotta-light); }
    .blog-hero p {
      color: rgba(250,246,239,0.65);
      font-size: 1.1rem;
      max-width: 520px;
      margin: 0 auto;
      font-weight: 300;
    }

    /* ── FILTER PILLS ── */
    .filter-bar {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      justify-content: center;
      padding: 2.5rem 2rem 0;
    }
    .filter-pill {
      padding: 0.4rem 1.1rem;
      border-radius: 999px;
      border: 1.5px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 0.82rem;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: 400;
    }
    .filter-pill:hover { border-color: var(--terracotta); color: var(--terracotta); }
    .filter-pill.active { background: var(--terracotta); border-color: var(--terracotta); color: white; }

    /* ── GRID ── */
    .blog-grid-wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 3rem 2rem 5rem;
    }

    /* Featured first card */
    .blog-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 2rem;
    }
    .blog-card:first-child {
      grid-column: 1 / 3;
    }

    .blog-card {
      background: var(--white);
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--border);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
    }
    .blog-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 48px rgba(45,74,45,0.12);
    }

    .card-image {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
      display: block;
    }
    .blog-card:first-child .card-image { aspect-ratio: 16/8; }

    .card-body {
      padding: 1.5rem;
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .card-meta {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.75rem;
    }
    .card-category {
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--terracotta);
      font-weight: 500;
    }
    .card-date {
      font-size: 0.78rem;
      color: var(--muted);
    }
    .card-dot { width: 3px; height: 3px; background: var(--border); border-radius: 50%; }

    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      line-height: 1.3;
      margin-bottom: 0.6rem;
      color: var(--text);
    }
    .blog-card:first-child .card-title { font-size: 1.5rem; }

    .card-excerpt {
      font-size: 0.9rem;
      color: var(--muted);
      line-height: 1.6;
      flex: 1;
      font-weight: 300;
    }

    .card-cta {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      margin-top: 1.2rem;
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--forest);
      letter-spacing: 0.04em;
    }
    .card-cta::after {
      content: '→';
      transition: transform 0.2s;
    }
    .blog-card:hover .card-cta::after { transform: translateX(4px); }

    /* ── NO RESULTS ── */
    #no-results {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--muted);
      display: none;
    }

    /* ── FOOTER ── */
    footer {
      background: var(--forest);
      color: rgba(250,246,239,0.6);
      text-align: center;
      padding: 2rem;
      font-size: 0.82rem;
    }
    footer a { color: var(--terracotta-light); text-decoration: none; }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      .blog-grid { grid-template-columns: 1fr 1fr; }
      .blog-card:first-child { grid-column: 1 / 3; }
    }
    @media (max-width: 600px) {
      .nav-links { display: none; }
      .blog-grid { grid-template-columns: 1fr; }
      .blog-card:first-child { grid-column: 1; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="/" class="nav-logo">Santana <span>Fruits</span></a>
    <ul class="nav-links">
      <li><a href="/">Start</a></li>
      <li><a href="/sortiment">Sortiment</a></li>
      <li><a href="/ueber-uns">Über uns</a></li>
      <li><a href="/blog" class="active">Blog</a></li>
      <li><a href="/kontakt">Kontakt</a></li>
    </ul>
  </nav>

  <header class="blog-hero">
    <span class="blog-hero-label">Wissen & Genuss</span>
    <h1>Unser <em>Blog</em></h1>
    <p>Rezepte, Saisonales und Geschichten aus der Welt der Tropenfrüchte.</p>
  </header>

  <div class="filter-bar" id="filterBar">
    <button class="filter-pill active" data-cat="alle">Alle</button>
    <button class="filter-pill" data-cat="Saisonales">Saisonales</button>
    <button class="filter-pill" data-cat="Nachhaltigkeit">Nachhaltigkeit</button>
    <button class="filter-pill" data-cat="Rezepte">Rezepte</button>
  </div>

  <main class="blog-grid-wrap">
    <div class="blog-grid" id="blogGrid"></div>
    <div id="no-results">
      <p>Keine Artikel in dieser Kategorie gefunden.</p>
    </div>
  </main>

  <footer>
    <p>© 2025 Santana Fruits · <a href="/impressum">Impressum</a> · <a href="/datenschutz">Datenschutz</a></p>
  </footer>

  <script>
    // ── Artikel laden ──
    // In Produktion: fetch('/blog/articles.json')
    // Für Demo: inline data
    const ARTICLES = [
      {
        slug: "mango-saison-2025",
        title: "Die Mango-Saison 2025: Was erwartet uns?",
        date: "2025-03-10",
        category: "Saisonales",
        image: "https://images.unsplash.com/photo-1553279768-865429fa0078?w=800&q=80",
        excerpt: "Die diesjährige Mango-Ernte verspricht außergewöhnliche Qualität. Wir berichten über Herkunft, Reife und die besten Sorten direkt vom Feld."
      },
      {
        slug: "tropenfruechte-regional-importieren",
        title: "Wie wir Tropenfrüchte nachhaltig importieren",
        date: "2025-02-18",
        category: "Nachhaltigkeit",
        image: "https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=800&q=80",
        excerpt: "Hinter jeder Frucht steckt eine Reise. Wir zeigen, wie wir mit unseren Partnern arbeiten, um Qualität und Fairness zu verbinden."
      },
      {
        slug: "papaya-rezepte-sommer",
        title: "5 Papaya-Rezepte für den Sommer",
        date: "2025-01-25",
        category: "Rezepte",
        image: "https://images.unsplash.com/photo-1526318472351-c75fcf070305?w=800&q=80",
        excerpt: "Papaya ist mehr als Frühstücksfrucht. Diese fünf Rezepte zeigen, wie vielseitig die orangefarbene Schönheit in der Küche ist."
      }
    ];

    function formatDate(iso) {
      return new Date(iso).toLocaleDateString('de-DE', { day: 'numeric', month: 'long', year: 'numeric' });
    }

    function renderCards(articles) {
      const grid = document.getElementById('blogGrid');
      const noResults = document.getElementById('no-results');
      grid.innerHTML = '';
      if (!articles.length) { noResults.style.display = 'block'; return; }
      noResults.style.display = 'none';
      articles.forEach(a => {
        grid.innerHTML += `
          <a class="blog-card" href="/blog/${a.slug}">
            <img class="card-image" src="${a.image}" alt="${a.title}" loading="lazy" />
            <div class="card-body">
              <div class="card-meta">
                <span class="card-category">${a.category}</span>
                <span class="card-dot"></span>
                <span class="card-date">${formatDate(a.date)}</span>
              </div>
              <h2 class="card-title">${a.title}</h2>
              <p class="card-excerpt">${a.excerpt}</p>
              <span class="card-cta">Weiterlesen</span>
            </div>
          </a>`;
      });
    }

    // Filter
    document.getElementById('filterBar').addEventListener('click', e => {
      const pill = e.target.closest('.filter-pill');
      if (!pill) return;
      document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
      const cat = pill.dataset.cat;
      const filtered = cat === 'alle' ? ARTICLES : ARTICLES.filter(a => a.category === cat);
      renderCards(filtered);
    });

    renderCards(ARTICLES);
  </script>
</body>
</html>
